<!-- Top info bar (desktop only) -->
<div class="topbar d-none d-lg-block">
    <div class="container">
        <div class="topbar-inner">
            <div class="topbar-left">
                <a [href]="'tel:' + phone" class="topbar-link">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
                    </svg>
                    {{ phone }}
                </a>
                <a [href]="'mailto:' + email" class="topbar-link">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="2" y="4" width="20" height="16" rx="2" />
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                    </svg>
                    {{ email }}
                </a>
            </div>
            <div class="topbar-right">
                <a [href]="socials.instagram" target="_blank" rel="noopener" class="topbar-social"
                    aria-label="Instagram">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" />
                        <circle cx="12" cy="12" r="4" />
                        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" />
                    </svg>
                </a>
                <a [href]="socials.facebook" target="_blank" rel="noopener" class="topbar-social" aria-label="Facebook">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
                    </svg>
                </a>
                <a [href]="socials.whatsapp" target="_blank" rel="noopener" class="topbar-social topbar-whatsapp"
                    aria-label="WhatsApp">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                    Chat with us
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Main Navbar -->
<nav class="main-nav" [class.scrolled]="isScrolled" [class.menu-open]="menuOpen" id="mainNav">
    <div class="container">
        <div class="nav-inner">

            <!-- Brand -->
            <a class="nav-brand" routerLink="/" (click)="closeMenu()">
                <span class="brand-mark">
                    <span class="brand-mark-inner"></span>
                </span>
                <span class="brand-text">SIGN<span class="brand-accent">TECH</span></span>
            </a>

            <!-- Desktop Links -->
            <ul class="nav-links d-none d-lg-flex">
                <li *ngFor="let link of navLinks">
                    <a [routerLink]="link.path" routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: link.path === '/' }" class="nav-link-item">
                        {{ link.label }}
                    </a>
                </li>
            </ul>

            <!-- Desktop CTA -->
            <div class="nav-cta d-none d-lg-flex align-items-center gap-3">
                <a [href]="socials.whatsapp" target="_blank" rel="noopener" class="nav-whatsapp-btn"
                    aria-label="WhatsApp">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                </a>
                <a routerLink="/contact" class="btn-nav-quote">Get a Quote</a>
            </div>

            <!-- Hamburger -->
            <button class="hamburger d-lg-none" [class.is-open]="menuOpen" (click)="toggleMenu()"
                aria-label="Toggle menu" [attr.aria-expanded]="menuOpen">
                <span class="ham-line"></span>
                <span class="ham-line"></span>
                <span class="ham-line"></span>
            </button>
        </div>
    </div>
</nav>

<!-- Mobile Menu — outside <nav> to avoid stacking context conflict -->
<div class="mobile-menu d-lg-none" [class.is-open]="menuOpen" [class.scrolled]="isScrolled">
    <div class="mobile-menu-inner">
        <ul class="mobile-nav-links">
            <li *ngFor="let link of navLinks; let i = index"
                [style.transition-delay]="menuOpen ? (i * 60) + 'ms' : '0ms'">
                <a [routerLink]="link.path" routerLinkActive="active"
                    [routerLinkActiveOptions]="{ exact: link.path === '/' }" (click)="closeMenu()">
                    {{ link.label }}
                </a>
            </li>
        </ul>
        <div class="mobile-actions">
            <a routerLink="/contact" class="btn-nav-quote w-100 text-center" (click)="closeMenu()">
                Get a Quote
            </a>
            <div class="mobile-socials">
                <a [href]="socials.instagram" target="_blank" rel="noopener" aria-label="Instagram"
                    class="mob-social-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" />
                        <circle cx="12" cy="12" r="4" />
                        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" />
                    </svg>
                    Instagram
                </a>
                <a [href]="socials.facebook" target="_blank" rel="noopener" aria-label="Facebook"
                    class="mob-social-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
                    </svg>
                    Facebook
                </a>
                <a [href]="socials.whatsapp" target="_blank" rel="noopener" aria-label="WhatsApp"
                    class="mob-social-link whatsapp">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                    WhatsApp
                </a>
            </div>
        </div>
    </div>
</div>
